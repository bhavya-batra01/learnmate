<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LearnMate | Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

<style>
body{
    font-family:Poppins,sans-serif;
    background:#efe9ff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.login{
    background:white;
    padding:40px;
    border-radius:20px;
    width:360px;
    box-shadow:0 20px 40px rgba(0,0,0,0.1);
    text-align:center;
}
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #ccc;
}
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:14px;
    background:linear-gradient(to right,#9b7fea,#7c5edc);
    color:white;
    font-weight:600;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="login">
    <h1>LearnMate</h1>
    <h3>Login to find your study buddy</h3>

    <form onsubmit="loginUser(event)">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</div>

<script>
// ===== CREATE USERS (ONLY ONCE) =====
if(!localStorage.getItem("users")){
    localStorage.setItem("users", JSON.stringify([
        {email:"bhavya@gmail.com",name:"Bhavya",skills:["Java","DSA"],hobbies:["Coding"],aim:"GATE"},
        {email:"aditi@gmail.com",name:"Aditi",skills:["DSA","Python"],hobbies:["Coding"],aim:"GATE"},
        {email:"rahul@gmail.com",name:"Rahul",skills:["Java","DBMS"],hobbies:["Music"],aim:"Placement"},
        {email:"neha@gmail.com",name:"Neha",skills:["CN","OS"],hobbies:["Reading"],aim:"MTech"},
        {email:"rohit@gmail.com",name:"Rohit",skills:["Maths","Aptitude"],hobbies:["Chess"],aim:"CAT"}
    ]));
}

// ===== LOGIN =====
function loginUser(e){
    e.preventDefault();
    const email=document.getElementById("email").value;
    const users=JSON.parse(localStorage.getItem("users"));

    const user=users.find(u=>u.email===email);
    if(!user){
        alert("User not found!");
        return;
    }

    localStorage.setItem("currentUser", email);
    window.location.href="buddies.html";
}
</script>

</body>
</html>
